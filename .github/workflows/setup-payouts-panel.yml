# =======================================
# Post the permanent Payouts Panel to a Discord channel
#
# Runs `discord-bot/setup-payouts-panel.js` using secrets stored in GitHub
# so you never need to paste a bot token into a terminal.
#
# Trigger: manual only (Actions tab → "Post Payouts Panel" → Run workflow)
#
# Required GitHub repository secrets:
#   DISCORD_BOT_TOKEN  — Bot token from the Discord Developer Portal
#   PAYOUTS_CHANNEL_ID — Default channel to post the panel in (#payouts)
#
# Optional workflow input:
#   channel_id — Override the target channel ID at run time.
#                Leave blank to use the PAYOUTS_CHANNEL_ID secret.
# =======================================
name: Post Payouts Panel

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: >
          Discord channel ID to post the panel in.
          Leave blank to use the PAYOUTS_CHANNEL_ID secret (your #payouts channel).
        required: false
        default: ''

jobs:
  post-panel:
    name: Post panel to Discord
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post Payouts panel
        working-directory: discord-bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # Use the manually-supplied channel_id if provided, otherwise fall
          # back to the PAYOUTS_CHANNEL_ID secret.
          DISCORD_CHANNEL_ID: ${{ inputs.channel_id != '' && inputs.channel_id || secrets.PAYOUTS_CHANNEL_ID }}
        run: node setup-payouts-panel.js
