# =======================================
# Deploy Kintsugi — Unified Cloudflare Worker
#
# Deploys the single root worker.js that serves both the web dashboard
# (static assets) and the Discord bot (interactions + cron).
#
# Triggers:
#   - Any push to `main` (all source files are now in one worker)
#   - Manual dispatch from the Actions tab
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN   — API token with Workers Scripts:Edit AND Workers KV Storage:Edit
#   CLOUDFLARE_ACCOUNT_ID  — Your Cloudflare account ID
#
# Optional GitHub repository secrets (pushed to the Worker when set):
#   DISCORD_PUBLIC_KEY     — From Discord Developer Portal → "Public Key"
#   DISCORD_BOT_TOKEN      — From Discord Developer Portal → Bot → "Reset Token"
#   DISCORD_APP_ID         — From Discord Developer Portal → "Application ID"
#   ANALYTICS_CHANNEL_ID   — Discord channel ID for the #analytics channel
#   JOBS_CHANNEL_ID        — Discord channel ID for the #jobs channel
#   PAYOUTS_CHANNEL_ID     — Discord channel ID for the #payouts channel
#   RIPTIDE_USER_ID        — Numeric Discord user ID to @mention on payday
#   TRIGGER_TOKEN          — Secret token for dashboard "Notify Discord" button
#   DEBUG_CHANNEL_ID       — Discord channel ID for bot activity/error debug embeds
#
# After deployment, copy the worker URL
#   (e.g. https://kintsugi-discord-bot.<subdomain>.workers.dev)
# and paste it into:
#   Discord Developer Portal → General Information → Interactions Endpoint URL
# =======================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Automatically provision the Workers KV namespace ----
      # NOTE: CLOUDFLARE_API_TOKEN must have "Workers KV Storage:Edit" permission.
      # Creates a KV namespace named "KINTSUGI_BOT" if it doesn't exist, then
      # injects its ID into wrangler.jsonc for the deploy step.
      # Retries up to 5 times with exponential back-off on transient failures.
      - name: Provision KV namespace (KINTSUGI_BOT)
        id: kv
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          # shellcheck source=.github/scripts/with_retry.sh
          . "$GITHUB_WORKSPACE/.github/scripts/with_retry.sh"

          fetch_namespaces() {
            NAMESPACES=$(curl -sf \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces?per_page=100" \
              -H "Authorization: Bearer ${CF_API_TOKEN}")
          }
          with_retry fetch_namespaces

          KV_ID=$(echo "${NAMESPACES}" | python3 -c '
          import json, sys
          raw = sys.stdin.read()
          try:
              data = json.loads(raw)
          except ValueError as e:
              print("ERROR: Cloudflare API returned non-JSON response: " + str(e), file=sys.stderr)
              print("Response was: " + raw[:500], file=sys.stderr)
              sys.exit(1)
          if not data.get("success"):
              print("ERROR: Cloudflare API call failed: " + str(data.get("errors", [])), file=sys.stderr)
              sys.exit(1)
          for ns in (data.get("result") or []):
              if ns.get("title") == "KINTSUGI_BOT":
                  print(ns["id"])
                  break
          ')

          if [ -z "${KV_ID}" ]; then
            echo "KV namespace 'KINTSUGI_BOT' not found — creating it..."

            create_namespace() {
              CREATED=$(curl -sf -X POST \
                "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"title":"KINTSUGI_BOT"}')
            }
            with_retry create_namespace

            KV_ID=$(echo "${CREATED}" | python3 -c '
          import json, sys
          raw = sys.stdin.read()
          try:
              data = json.loads(raw)
          except ValueError as e:
              print("ERROR: Cloudflare API returned non-JSON response: " + str(e), file=sys.stderr)
              print("Response was: " + raw[:500], file=sys.stderr)
              sys.exit(1)
          if not data.get("success"):
              print("ERROR: Cloudflare API call failed: " + str(data.get("errors", [])), file=sys.stderr)
              print("Ensure CLOUDFLARE_API_TOKEN has Workers KV Storage:Edit permission.", file=sys.stderr)
              sys.exit(1)
          print(data["result"]["id"])
          ')
            echo "Created KV namespace 'KINTSUGI_BOT'."
          else
            echo "Found existing KV namespace 'KINTSUGI_BOT'."
          fi

          echo "kv_namespace_id=${KV_ID}" >> "${GITHUB_OUTPUT}"

      # ---- Append the KV binding to wrangler.jsonc and wrangler-bot.jsonc ----
      # This modifies the checked-out copies; they are never committed to the repo.
      - name: Inject KV binding into wrangler configs
        run: |
          # Uses node for JSON-safe editing.  Both configs share the same KV namespace.
          node - "${{ steps.kv.outputs.kv_namespace_id }}" << 'EOF'
          const fs   = require('fs');
          const kvId = process.argv[2];
          for (const file of ['wrangler.jsonc', 'wrangler-bot.jsonc']) {
            const raw      = fs.readFileSync(file, 'utf8');
            // Strip single-line // comments so JSON.parse works
            const stripped = raw.replace(/\/\/[^\n]*/g, '');
            const cfg      = JSON.parse(stripped);
            cfg.kv_namespaces = [{ binding: 'KV', id: kvId }];
            // Write back as standard JSON (wrangler accepts both jsonc and json)
            fs.writeFileSync(file, JSON.stringify(cfg, null, 2));
            console.log(`KV binding injected into ${file}`);
          }
          EOF

      # ---- Deploy the primary "kintsugi" Worker ----
      # Uses the official Cloudflare Wrangler Action.
      # Secrets are pushed in the next step (after deploy) to avoid Cloudflare
      # error 10214: wrangler-action uploads secrets before the deploy command,
      # which fails when no version is currently deployed.
      - name: Deploy Worker (kintsugi)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.72.0'
          command: deploy --config wrangler.jsonc

      # ---- Push secrets to "kintsugi" after deploy ----
      # Running secret bulk after deploy ensures the latest version is deployed,
      # satisfying the Cloudflare version-level settings API requirement.
      - name: Push secrets (kintsugi)
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_PUBLIC_KEY:    ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          ANALYTICS_CHANNEL_ID:  ${{ secrets.ANALYTICS_CHANNEL_ID }}
          JOBS_CHANNEL_ID:       ${{ secrets.JOBS_CHANNEL_ID }}
          PAYOUTS_CHANNEL_ID:    ${{ secrets.PAYOUTS_CHANNEL_ID }}
          RIPTIDE_USER_ID:       ${{ secrets.RIPTIDE_USER_ID }}
          TRIGGER_TOKEN:         ${{ secrets.TRIGGER_TOKEN }}
          DEBUG_CHANNEL_ID:      ${{ secrets.DEBUG_CHANNEL_ID }}
          BOT_APP_ID:            ${{ secrets.DISCORD_APP_ID }}
        run: bash "$GITHUB_WORKSPACE/.github/scripts/push-worker-secrets.sh" kintsugi

      # ---- Deploy the alias "kintsugi-discord-bot" Worker ----
      # Deploys the same worker.js under the legacy name so that existing Discord
      # Developer Portal Interactions Endpoint URLs pointing to kintsugi-discord-bot
      # continue to work alongside the primary kintsugi worker.
      # The DiscordGateway Durable Object is referenced as a foreign namespace from
      # the primary worker, so both URLs share the same gateway connection.
      - name: Deploy Worker (kintsugi-discord-bot)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.72.0'
          command: deploy --config wrangler-bot.jsonc

      # ---- Push secrets to "kintsugi-discord-bot" after deploy ----
      - name: Push secrets (kintsugi-discord-bot)
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_PUBLIC_KEY:    ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          ANALYTICS_CHANNEL_ID:  ${{ secrets.ANALYTICS_CHANNEL_ID }}
          JOBS_CHANNEL_ID:       ${{ secrets.JOBS_CHANNEL_ID }}
          PAYOUTS_CHANNEL_ID:    ${{ secrets.PAYOUTS_CHANNEL_ID }}
          RIPTIDE_USER_ID:       ${{ secrets.RIPTIDE_USER_ID }}
          TRIGGER_TOKEN:         ${{ secrets.TRIGGER_TOKEN }}
          DEBUG_CHANNEL_ID:      ${{ secrets.DEBUG_CHANNEL_ID }}
          BOT_APP_ID:            ${{ secrets.DISCORD_APP_ID }}
        run: bash "$GITHUB_WORKSPACE/.github/scripts/push-worker-secrets.sh" kintsugi-discord-bot

      # ---- Register slash commands ----
      - name: Register slash commands
        env:
          DISCORD_APP_ID:    ${{ secrets.DISCORD_APP_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_APP_ID:-}" ]; then
            echo "DISCORD_APP_ID not set — skipping slash command registration."
            echo "Add DISCORD_APP_ID to GitHub Secrets and redeploy, or run the 'Register Slash Commands' workflow manually."
          else
            . "$GITHUB_WORKSPACE/.github/scripts/with_retry.sh"
            with_retry node scripts/register-commands.js
          fi

      # ---- Start the DiscordGateway Durable Object ----
      # After every deploy the DO restarts with no open WebSocket, so the bot
      # will not respond to @mentions until the gateway is reconnected.
      # This step calls POST /api/gateway-start immediately so the bot is live
      # as soon as the deploy finishes — no waiting for the next hourly cron.
      #
      # DISCORD_BOT_TOKEN is kept server-side only; only TRIGGER_TOKEN is used
      # here to authenticate the management endpoint.
      - name: Start Discord Gateway
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TRIGGER_TOKEN:         ${{ secrets.TRIGGER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${TRIGGER_TOKEN:-}" ]; then
            echo "TRIGGER_TOKEN not set — skipping gateway start."
            echo "Add TRIGGER_TOKEN to GitHub Secrets and redeploy to enable auto-start."
            exit 0
          fi

          # Fetch the workers.dev subdomain for this Cloudflare account.
          SUBDOMAIN=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if data.get('success') and data.get('result', {}).get('subdomain'):
              print(data['result']['subdomain'])
          else:
              sys.exit(1)
          " 2>/dev/null) || true

          if [ -z "${SUBDOMAIN:-}" ]; then
            echo "Could not determine workers.dev subdomain — skipping gateway start."
            exit 0
          fi

          WORKER_URL="https://kintsugi.${SUBDOMAIN}.workers.dev"
          echo "Calling gateway-start on ${WORKER_URL} ..."

          # Allow time for the new worker version to propagate to the edge.
          sleep 15

          # Attempt to start the gateway; retry up to 3 times on transient failures.
          # -s (silent) without -f so that 4xx/5xx HTTP status codes are still
          # captured via -w "%{http_code}" rather than being overridden by the
          # || fallback.  Network-level failures (timeout, connection refused) set
          # HTTP_STATUS to "000" via the || fallback.
          attempt=1
          max_attempts=3
          HTTP_STATUS="000"
          while [ "$attempt" -le "$max_attempts" ]; do
            HTTP_STATUS=$(curl -s -o /tmp/gw_response.json -w "%{http_code}" \
              -X POST "${WORKER_URL}/api/gateway-start" \
              -H "Authorization: Bearer ${TRIGGER_TOKEN}" \
              --max-time 60) || HTTP_STATUS="000"

            BODY=$(cat /tmp/gw_response.json 2>/dev/null || echo "(no response)")
            echo "Attempt ${attempt}/${max_attempts}: Gateway start → HTTP ${HTTP_STATUS}: ${BODY}"

            if [ "${HTTP_STATUS}" = "200" ]; then
              echo "Gateway started successfully."
              break
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Retrying in 15s..."
              sleep 15
            fi
            attempt=$((attempt + 1))
          done

          # Treat 200 as success; anything else is a warning but must not fail the
          # deploy — the hourly cron will recover the gateway connection.
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "Warning: gateway start returned HTTP ${HTTP_STATUS} after ${max_attempts} attempt(s). The hourly cron will retry."
          fi
