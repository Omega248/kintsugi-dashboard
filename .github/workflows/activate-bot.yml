# =======================================
# Activate Bot — one-click full activation
#
# Run this workflow once after the first deploy (or whenever the bot needs to
# be fully re-activated after an outage) to bring every component online:
#
#   1. Register slash commands with Discord
#      (/payouts, /update-analytics, /ask)
#
#   2. Start the Discord Gateway WebSocket connection
#      (required for the bot to receive and reply to @mentions)
#
#   3. Trigger an initial weekly run
#      (posts / refreshes the analytics summary and jobs list in Discord)
#
# Trigger: manual only — Actions tab → "Activate Bot" → Run workflow
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN  — Workers:Edit + KV Storage:Edit permission
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#   DISCORD_APP_ID        — Application ID from Discord Developer Portal
#   DISCORD_BOT_TOKEN     — Bot token from Discord Developer Portal
#   TRIGGER_TOKEN         — Secret used to authenticate dashboard API calls
#
# Optional:
#   guild_id input        — Register commands in a specific guild instead of
#                           globally (guild commands appear instantly; global
#                           commands can take up to 1 hour to propagate).
#
# Security note: DISCORD_BOT_TOKEN is used only server-side (Discord API calls
# and the Cloudflare Worker secret store). It is never sent to the browser,
# included in logs, or exposed via any public endpoint.
# =======================================
name: Activate Bot

on:
  workflow_dispatch:
    inputs:
      guild_id:
        description: >
          (Optional) Discord guild (server) ID to register slash commands in.
          Leave blank to register globally (may take up to 1 hour to propagate).
          Guild commands update instantly — use this for testing.
        required: false
        default: ''
      skip_weekly_trigger:
        description: >
          Set to "true" to skip the initial weekly run (analytics + jobs update).
          Useful if you only want to restart the gateway / re-register commands.
        required: false
        default: 'false'

jobs:
  activate:
    name: Activate all bot components
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ------------------------------------------------------------------
      # Step 1 — Register slash commands with Discord
      # ------------------------------------------------------------------
      - name: Register slash commands
        env:
          DISCORD_APP_ID:    ${{ secrets.DISCORD_APP_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID:  ${{ inputs.guild_id }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_APP_ID:-}" ] || [ -z "${DISCORD_BOT_TOKEN:-}" ]; then
            echo "::warning::DISCORD_APP_ID or DISCORD_BOT_TOKEN not set — skipping command registration."
            echo "  Add both secrets to GitHub repository secrets and re-run this workflow."
            exit 0
          fi

          node scripts/register-commands.js
          echo "::notice::Slash commands registered successfully."

      # ------------------------------------------------------------------
      # Step 2 — Resolve the deployed worker URL from Cloudflare
      # Used by both the Gateway start and the weekly trigger steps below.
      # ------------------------------------------------------------------
      - name: Resolve worker URL
        id: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN not set — worker URL unknown."
            echo "worker_url=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          SUBDOMAIN=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if data.get('success') and data.get('result', {}).get('subdomain'):
              print(data['result']['subdomain'])
          else:
              sys.exit(1)
          " 2>/dev/null) || true

          if [ -z "${SUBDOMAIN:-}" ]; then
            echo "::warning::Could not determine workers.dev subdomain from Cloudflare API."
            echo "worker_url=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          WORKER_URL="https://kintsugi.${SUBDOMAIN}.workers.dev"
          echo "worker_url=${WORKER_URL}" >> "${GITHUB_OUTPUT}"
          echo "Worker URL: ${WORKER_URL}"

      # ------------------------------------------------------------------
      # Step 3 — Start the Discord Gateway Durable Object
      # Required for the bot to receive MESSAGE_CREATE events and reply to @mentions.
      # DISCORD_BOT_TOKEN stays server-side; only TRIGGER_TOKEN is used here.
      # ------------------------------------------------------------------
      - name: Start Discord Gateway
        env:
          TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
          WORKER_URL:    ${{ steps.worker.outputs.worker_url }}
        run: |
          set -euo pipefail

          if [ -z "${TRIGGER_TOKEN:-}" ]; then
            echo "::warning::TRIGGER_TOKEN not set — cannot start gateway."
            echo "  Add TRIGGER_TOKEN to GitHub repository secrets and re-run this workflow."
            exit 0
          fi

          if [ -z "${WORKER_URL:-}" ]; then
            echo "::warning::Worker URL not resolved — skipping gateway start."
            exit 0
          fi

          echo "Calling POST ${WORKER_URL}/api/gateway-start …"

          HTTP_STATUS=$(curl -sf -o /tmp/gw_response.json -w "%{http_code}" \
            -X POST "${WORKER_URL}/api/gateway-start" \
            -H "Authorization: Bearer ${TRIGGER_TOKEN}" \
            --max-time 30 2>/dev/null) || HTTP_STATUS="error"

          BODY=$(cat /tmp/gw_response.json 2>/dev/null || echo "(no response)")
          echo "Gateway start → HTTP ${HTTP_STATUS}: ${BODY}"

          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "::notice::Discord Gateway started. The bot will now reply to @mentions."
          else
            echo "::warning::Gateway start returned HTTP ${HTTP_STATUS}. Check bot logs for details."
          fi

      # ------------------------------------------------------------------
      # Step 4 — Check gateway status (confirm it connected)
      # ------------------------------------------------------------------
      - name: Check Gateway status
        env:
          TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
          WORKER_URL:    ${{ steps.worker.outputs.worker_url }}
        run: |
          set -euo pipefail

          if [ -z "${TRIGGER_TOKEN:-}" ] || [ -z "${WORKER_URL:-}" ]; then
            echo "Skipping status check (TRIGGER_TOKEN or WORKER_URL not available)."
            exit 0
          fi

          # Give the gateway a moment to complete the Discord handshake.
          sleep 8

          HTTP_STATUS=$(curl -sf -o /tmp/gw_status.json -w "%{http_code}" \
            -X GET "${WORKER_URL}/api/gateway-status" \
            -H "Authorization: Bearer ${TRIGGER_TOKEN}" \
            --max-time 15 2>/dev/null) || HTTP_STATUS="error"

          BODY=$(cat /tmp/gw_status.json 2>/dev/null || echo "(no response)")
          echo "Gateway status → HTTP ${HTTP_STATUS}: ${BODY}"

          CONNECTED=$(python3 -c "
          import json, sys
          try:
              print('yes' if json.loads(sys.stdin.read()).get('connected') else 'no')
          except Exception:
              print('unknown')
          " <<< "${BODY}" 2>/dev/null || echo "unknown")

          if [ "${CONNECTED}" = "yes" ]; then
            echo "::notice::Gateway is CONNECTED — bot is live and listening for @mentions."
          elif [ "${CONNECTED}" = "no" ]; then
            echo "::warning::Gateway reports NOT connected. The Discord handshake may still be in progress; check /Logs/ in a minute."
          else
            echo "::warning::Could not determine gateway status."
          fi

      # ------------------------------------------------------------------
      # Step 5 — Trigger initial weekly run (analytics + jobs update)
      # Populates the configured Discord channels immediately so admins
      # don't have to wait for the first hourly cron.
      # ------------------------------------------------------------------
      - name: Trigger initial weekly run
        if: ${{ inputs.skip_weekly_trigger != 'true' }}
        env:
          TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
          WORKER_URL:    ${{ steps.worker.outputs.worker_url }}
        run: |
          set -euo pipefail

          if [ -z "${TRIGGER_TOKEN:-}" ]; then
            echo "::warning::TRIGGER_TOKEN not set — skipping weekly trigger."
            exit 0
          fi

          if [ -z "${WORKER_URL:-}" ]; then
            echo "::warning::Worker URL not resolved — skipping weekly trigger."
            exit 0
          fi

          echo "Calling POST ${WORKER_URL}/api/trigger-weekly …"

          HTTP_STATUS=$(curl -sf -o /tmp/weekly_response.json -w "%{http_code}" \
            -X POST "${WORKER_URL}/api/trigger-weekly" \
            -H "Authorization: Bearer ${TRIGGER_TOKEN}" \
            -H "Content-Type: application/json" \
            --max-time 60 2>/dev/null) || HTTP_STATUS="error"

          BODY=$(cat /tmp/weekly_response.json 2>/dev/null || echo "(no response)")
          echo "Weekly trigger → HTTP ${HTTP_STATUS}: ${BODY}"

          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "::notice::Weekly run triggered — analytics and jobs channels have been updated."
          else
            echo "::warning::Weekly trigger returned HTTP ${HTTP_STATUS}. Check the bot logs for details."
          fi

      # ------------------------------------------------------------------
      # Summary
      # ------------------------------------------------------------------
      - name: Activation summary
        env:
          WORKER_URL: ${{ steps.worker.outputs.worker_url }}
        run: |
          echo ""
          echo "============================================================"
          echo "  Kintsugi Bot — Activation complete"
          echo "============================================================"
          echo ""
          echo "  Slash commands  : registered with Discord"
          echo "  Discord Gateway : started (bot will reply to @mentions)"
          echo "  Weekly run      : triggered (analytics + jobs updated)"
          echo ""
          if [ -n "${WORKER_URL:-}" ]; then
            echo "  View logs       : ${WORKER_URL}/Logs/"
            echo "  Gateway status  : ${WORKER_URL}/api/gateway-status"
          fi
          echo ""
          echo "  Next steps:"
          echo "    • In the Discord Developer Portal, ensure the bot's"
          echo "      'Message Content Intent' is enabled under Bot → Privileged"
          echo "      Gateway Intents (required for @mention replies)."
          echo "    • If this is a first deploy, set the Interactions Endpoint URL"
          echo "      in the Discord Developer Portal to:"
          if [ -n "${WORKER_URL:-}" ]; then
            echo "        ${WORKER_URL}"
          else
            echo "        (your Cloudflare Worker URL)"
          fi
          echo "============================================================"
