# =======================================
# Post Payouts Processed to Discord
#
# Fetches the most recent week's payout data from Google Sheets and posts a
# "Payouts Processed" embed to the #payouts Discord channel.
#
# Trigger: manual only (Actions tab → "Post Payouts Processed" → Run workflow)
#
# Required GitHub repository secrets:
#   DISCORD_BOT_TOKEN  — Bot token from the Discord Developer Portal
#   PAYOUTS_CHANNEL_ID — Discord channel ID for the #payouts channel
#
# Optional GitHub repository secrets:
#   PAYOUT_CONTACT_USER_ID — Discord user ID to mention for payout issue queries
#
# Optional workflow input:
#   channel_id — Override the target channel ID at run time.
#                Leave blank to use the PAYOUTS_CHANNEL_ID secret.
# =======================================
name: Post Payouts Processed

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: >
          Discord channel ID to post the payouts notification in.
          Leave blank to use the PAYOUTS_CHANNEL_ID secret (your #payouts channel).
        required: false
        default: ''

jobs:
  post-payouts:
    name: Post payouts to Discord
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post Payouts Processed notification
        working-directory: discord-bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # Use the manually-supplied channel_id if provided, otherwise fall
          # back to the PAYOUTS_CHANNEL_ID secret.
          DISCORD_CHANNEL_ID: ${{ inputs.channel_id != '' && inputs.channel_id || secrets.PAYOUTS_CHANNEL_ID }}
          # Optional: Discord user ID to mention in the "issues" footer note.
          PAYOUT_CONTACT_USER_ID: ${{ secrets.PAYOUT_CONTACT_USER_ID }}
        run: node post-payouts.js
