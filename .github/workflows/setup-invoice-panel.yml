# =======================================
# Post (or update) the permanent Invoice Panel in a Discord channel
#
# Runs `discord-bot/setup-invoice-panel.js` using secrets stored in GitHub
# so you never need to paste a bot token into a terminal.
#
# Trigger: manual only (Actions tab → "Post Invoice Panel" → Run workflow)
#
# Required GitHub repository secrets:
#   DISCORD_BOT_TOKEN  — Bot token from the Discord Developer Portal
#   INVOICE_CHANNEL_ID — Default channel to post the panel in (#invoice)
#
# Optional workflow inputs:
#   channel_id        — Override the target channel ID at run time.
#                       Leave blank to use the INVOICE_CHANNEL_ID secret.
#   panel_message_id  — Discord message ID of the existing panel to edit.
#                       When provided the script PATCHes the existing message
#                       instead of POSTing a new one, keeping the pinned
#                       message in place and avoiding stale duplicate panels.
#   delete_existing   — Set to "true" together with panel_message_id to DELETE
#                       the old panel message and POST a brand-new one.
#                       Use this when the old panel is broken and you want a
#                       fresh message (you will need to pin the new message).
# =======================================
name: Post Invoice Panel

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: >
          Discord channel ID to post the panel in.
          Leave blank to use the INVOICE_CHANNEL_ID secret (your #invoice channel).
        required: false
        default: ''
      panel_message_id:
        description: >
          Discord message ID of the existing panel to edit instead of posting a new one.
          Leave blank to post a fresh panel (get the ID from the first run's output).
          Provide this together with delete_existing=true to delete and recreate.
        required: false
        default: ''
      delete_existing:
        description: >
          Set to "true" to DELETE the panel_message_id message and post a brand-new panel.
          The old message is removed from Discord before the new one is posted.
          You will need to pin the resulting new message manually.
        required: false
        default: 'false'

jobs:
  post-panel:
    name: Post Invoice panel to Discord
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Post Invoice panel
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # Use the manually-supplied channel_id if provided, otherwise fall
          # back to the INVOICE_CHANNEL_ID secret.
          DISCORD_CHANNEL_ID: ${{ inputs.channel_id != '' && inputs.channel_id || secrets.INVOICE_CHANNEL_ID }}
          # When panel_message_id is supplied the script edits the existing
          # message instead of posting a new one.
          PANEL_MESSAGE_ID: ${{ inputs.panel_message_id }}
          # When true (and PANEL_MESSAGE_ID is set) the script deletes the old
          # message and posts a fresh panel instead of patching in place.
          DELETE_EXISTING: ${{ inputs.delete_existing }}
        run: node scripts/setup-invoice-panel.js

