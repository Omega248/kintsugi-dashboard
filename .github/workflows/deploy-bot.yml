# =======================================
# Deploy Kintsugi Discord Bot to Cloudflare Workers
#
# Triggers:
#   - Any push to `main` that changes files inside discord-bot/
#   - Manual dispatch from the Actions tab
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Your Cloudflare account ID
#   DISCORD_PUBLIC_KEY     — From Discord Developer Portal → "Public Key"
# =======================================
name: Deploy Discord Bot

on:
  push:
    branches: [main]
    paths:
      - 'discord-bot/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: discord-bot
          # Sync DISCORD_PUBLIC_KEY from GitHub Secrets → Cloudflare Worker secret
          secrets: |
            DISCORD_PUBLIC_KEY
        env:
          DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
