# =======================================
# Deploy Kintsugi Discord Bot to Cloudflare Workers
#
# Triggers:
#   - Any push to `main` that changes files inside discord-bot/
#   - Manual dispatch from the Actions tab
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers Scripts:Edit AND Workers KV Storage:Edit permissions
#   CLOUDFLARE_ACCOUNT_ID  — Your Cloudflare account ID
#
# Optional GitHub repository secrets (pushed to the Worker when set):
#   DISCORD_PUBLIC_KEY     — From Discord Developer Portal → "Public Key"
#   DISCORD_BOT_TOKEN      — From Discord Developer Portal → Bot → "Reset Token"
#   DISCORD_APP_ID         — From Discord Developer Portal → "Application ID" (used to register slash commands)
#   ANALYTICS_CHANNEL_ID   — Discord channel ID for the #analytics channel
#   JOBS_CHANNEL_ID        — Discord channel ID for the #jobs channel
#   PAYOUTS_CHANNEL_ID     — Discord channel ID for the #payouts channel
#   RIPTIDE_USER_ID        — Numeric Discord user ID to @mention on payday
#   TRIGGER_TOKEN          — Secret token for the "Post Payouts Processed" GitHub Actions workflow
#
# Missing optional secrets are skipped gracefully — the Worker will still
# deploy; it just won't be able to post to Discord until the secrets are added.
#
# The worker is deployed as "kintsugi-discord-bot" — a dedicated Cloudflare Worker
# separate from the static-assets worker ("kintsugi").  After deployment,
# copy the worker URL (e.g. https://kintsugi-discord-bot.<subdomain>.workers.dev)
# and paste it into Discord Developer Portal → General Information →
# Interactions Endpoint URL.
#
# KV provisioning is fully automatic: this workflow ensures a KV namespace
# named "KINTSUGI_BOT" exists in your Cloudflare account (creating it if it
# doesn't), then binds it to the Worker as "KV" — no manual steps required.
# =======================================
name: Deploy Discord Bot

on:
  push:
    branches: [main]
    paths:
      - 'discord-bot/**'
      - '.github/workflows/deploy-bot.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Automatically provision the Workers KV namespace ----
      # Uses the Cloudflare REST API to look up (or create) a namespace named
      # "KINTSUGI_BOT", then writes its id into wrangler.toml for the deploy step.
      # The namespace id is NOT a credential — it is safe to embed in config files,
      # but we avoid committing it to the repo so deploys always use the live id.
      - name: Provision KV namespace (KINTSUGI_BOT)
        id: kv
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          # ---- List existing KV namespaces (up to 100) ----
          NAMESPACES=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces?per_page=100" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")

          KV_ID=$(echo "${NAMESPACES}" | python3 -c '
          import json, sys
          raw = sys.stdin.read()
          try:
              data = json.loads(raw)
          except ValueError as e:
              print("ERROR: Cloudflare API returned non-JSON response: " + str(e), file=sys.stderr)
              print("Response was: " + raw[:500], file=sys.stderr)
              sys.exit(1)
          if not data.get("success"):
              print("ERROR: Cloudflare API call failed: " + str(data.get("errors", [])), file=sys.stderr)
              sys.exit(1)
          for ns in (data.get("result") or []):
              if ns.get("title") == "KINTSUGI_BOT":
                  print(ns["id"])
                  break
          ')

          if [ -z "${KV_ID}" ]; then
            echo "KV namespace 'KINTSUGI_BOT' not found — creating it..."
            CREATED=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"title":"KINTSUGI_BOT"}')
            KV_ID=$(echo "${CREATED}" | python3 -c '
          import json, sys
          raw = sys.stdin.read()
          try:
              data = json.loads(raw)
          except ValueError as e:
              print("ERROR: Cloudflare API returned non-JSON response: " + str(e), file=sys.stderr)
              print("Response was: " + raw[:500], file=sys.stderr)
              sys.exit(1)
          if not data.get("success"):
              print("ERROR: Cloudflare API call failed: " + str(data.get("errors", [])), file=sys.stderr)
              print("Ensure CLOUDFLARE_API_TOKEN has Workers KV Storage:Edit permission.", file=sys.stderr)
              sys.exit(1)
          print(data["result"]["id"])
          ')
            echo "Created KV namespace 'KINTSUGI_BOT'."
          else
            echo "Found existing KV namespace 'KINTSUGI_BOT'."
          fi

          echo "kv_namespace_id=${KV_ID}" >> "${GITHUB_OUTPUT}"

      # ---- Append the KV binding to wrangler.toml for this run only ----
      # This modifies the checked-out copy; it is never committed to the repo.
      - name: Inject KV binding into wrangler.toml
        run: |
          printf '\n[[kv_namespaces]]\nbinding = "KV"\nid      = "%s"\n' \
            "${{ steps.kv.outputs.kv_namespace_id }}" \
            >> discord-bot/wrangler.toml

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: discord-bot
          # Secrets are pushed in the next step so that missing secrets
          # (e.g. during initial setup before Discord credentials are added)
          # do not cause a hard failure here.

      # ---- Push all secrets only when they are configured ----
      # wrangler secret put rejects empty-string values, so we skip any secret
      # whose corresponding GitHub Secret is not set.  This makes the workflow
      # resilient to first-time deploys where Discord secrets have not yet been
      # added to the GitHub repository.
      - name: Push secrets
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_PUBLIC_KEY:    ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          ANALYTICS_CHANNEL_ID:  ${{ secrets.ANALYTICS_CHANNEL_ID }}
          JOBS_CHANNEL_ID:       ${{ secrets.JOBS_CHANNEL_ID }}
          PAYOUTS_CHANNEL_ID:    ${{ secrets.PAYOUTS_CHANNEL_ID }}
          RIPTIDE_USER_ID:       ${{ secrets.RIPTIDE_USER_ID }}
          TRIGGER_TOKEN:         ${{ secrets.TRIGGER_TOKEN }}
        working-directory: discord-bot
        run: |
          set -euo pipefail
          push_secret() {
            local name="$1"
            local value="${2:-}"
            if [ -n "${value}" ]; then
              echo "Pushing ${name}..."
              printf '%s' "${value}" | wrangler secret put "${name}"
            else
              echo "${name} not set — skipping."
            fi
          }
          push_secret DISCORD_PUBLIC_KEY    "${DISCORD_PUBLIC_KEY:-}"
          push_secret DISCORD_BOT_TOKEN     "${DISCORD_BOT_TOKEN:-}"
          push_secret ANALYTICS_CHANNEL_ID  "${ANALYTICS_CHANNEL_ID:-}"
          push_secret JOBS_CHANNEL_ID       "${JOBS_CHANNEL_ID:-}"
          push_secret PAYOUTS_CHANNEL_ID    "${PAYOUTS_CHANNEL_ID:-}"
          push_secret RIPTIDE_USER_ID       "${RIPTIDE_USER_ID:-}"
          push_secret TRIGGER_TOKEN         "${TRIGGER_TOKEN:-}"

      # ---- Register slash commands ----
      # Registers /payouts and /analytics globally with Discord.
      # Requires DISCORD_APP_ID and DISCORD_BOT_TOKEN.
      # Skipped gracefully if DISCORD_APP_ID is not configured (commands can
      # be registered later by running the Register Slash Commands workflow).
      - name: Register slash commands
        env:
          DISCORD_APP_ID:    ${{ secrets.DISCORD_APP_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        working-directory: discord-bot
        run: |
          if [ -z "${DISCORD_APP_ID:-}" ]; then
            echo "DISCORD_APP_ID not set — skipping slash command registration."
            echo "Add DISCORD_APP_ID to GitHub Secrets and redeploy, or run the 'Register Slash Commands' workflow manually."
          else
            node register-commands.js
          fi

