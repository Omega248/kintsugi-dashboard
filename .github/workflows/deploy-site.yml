# =======================================
# Deploy Kintsugi Dashboard (static site) to Cloudflare Workers
#
# Generates bot-config.js from GitHub Secrets so the "Post Weekly Update to
# Discord" and "Notify Discord: Payouts Processed" buttons work without any
# manual configuration in the browser.
#
# Triggers:
#   - Any push to `main` that changes site files (excludes discord-bot/)
#   - Manual dispatch from the Actions tab
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers Scripts:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Your Cloudflare account ID
#
# Optional GitHub repository secrets (used to pre-configure the Discord buttons):
#   TRIGGER_TOKEN          — The TRIGGER_TOKEN secret set on the Discord bot worker.
#                            When provided, the "Post Weekly Update" and
#                            "Notify Discord" dashboard buttons work automatically
#                            without any manual token entry.
#   BOT_WORKER_URL         — Override the Discord bot worker URL.
#                            Defaults to: https://kintsugi-discord-bot.reecestangoe0824.workers.dev
# =======================================
name: Deploy Dashboard Site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'discord-bot/**'
      - '.github/workflows/deploy-bot.yml'
      - '.github/workflows/register-commands.yml'
      - '.github/workflows/setup-*.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate bot-config.js so the dashboard Discord buttons work without
      # any manual token entry.  The file is created on the fly and is never
      # committed to the repository (it is listed in .gitignore).
      - name: Generate bot-config.js from secrets
        env:
          BOT_WORKER_URL: ${{ secrets.BOT_WORKER_URL }}
          TRIGGER_TOKEN:  ${{ secrets.TRIGGER_TOKEN }}
        run: |
          BOT_URL="${BOT_WORKER_URL:-https://kintsugi-discord-bot.reecestangoe0824.workers.dev}"
          TOKEN="${TRIGGER_TOKEN:-}"

          cat > bot-config.js << JSEOF
// Auto-generated by GitHub Actions deploy-site workflow.
// DO NOT commit this file — it contains secrets. It is listed in .gitignore.
window.KINTSUGI_BOT_CONFIG = {
  url:   "${BOT_URL}",
  token: "${TOKEN}"
};
JSEOF

          if [ -z "${TOKEN}" ]; then
            echo "⚠️  TRIGGER_TOKEN is not set — dashboard Discord buttons will still prompt for the token manually."
          else
            echo "✅ bot-config.js generated with bot URL and trigger token."
          fi

      - name: Deploy static site
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
