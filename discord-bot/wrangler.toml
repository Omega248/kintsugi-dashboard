# =======================================
# Kintsugi Discord Bot — Cloudflare Workers config
# https://developers.cloudflare.com/workers/wrangler/configuration/
# =======================================

name               = "kintsugi-discord-bot"
main               = "worker.js"
compatibility_date = "2024-09-23"

# ===== Scheduled Cron Trigger =====
# Fires every Sunday at 18:00 UTC to:
#   • Edit the pinned analytics summary (or post it fresh if it doesn't exist yet)
#   • Send a payday reminder ping (once per week, deduplicated via KV)
[triggers]
crons = ["0 18 * * 0"]

# ===== KV Namespace =====
# Used to persist the analytics message ID and the last reminder week so the
# cron edits existing messages rather than posting new ones each run.
#
# ⚠️  SETUP REQUIRED before first deployment:
#   1. Run:  wrangler kv:namespace create "KINTSUGI_BOT"
#   2. Copy the returned `id` and paste it as the value below, replacing the placeholder.
#   3. Re-deploy:  wrangler deploy
[[kv_namespaces]]
binding = "KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ===== Required Secrets =====
# Set each secret once with:  wrangler secret put <NAME>
#
#   DISCORD_PUBLIC_KEY    — Ed25519 public key from the Discord Developer Portal
#   ANALYTICS_WEBHOOK_URL — Discord webhook URL for the weekly analytics summary post
#   PAYOUTS_WEBHOOK_URL   — Discord webhook URL for the payday reminder ping
#   RIPTIDE_USER_ID       — Numeric Discord user ID to @mention on payday (e.g. "123456789012345678")
