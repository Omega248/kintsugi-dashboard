# =======================================
# Kintsugi Discord Bot — Cloudflare Workers config
# https://developers.cloudflare.com/workers/wrangler/configuration/
#
# This worker is deployed as "kintsugi-bot", separate from the static-assets
# worker ("kintsugi").  After deployment, the worker URL will be:
#   https://kintsugi-bot.<subdomain>.workers.dev
#
# Paste that URL into Discord Developer Portal → General Information →
# Interactions Endpoint URL, then click Save Changes.  Discord will send a
# PING; the Worker responds with PONG automatically. ✅
# =======================================

name               = "kintsugi-discord-bot"
main               = "worker.js"
compatibility_date = "2024-09-23"

# ===== Scheduled Cron Trigger =====
# Fires every 5 minutes to:
#   • Edit the pinned analytics summary (or post it fresh if it doesn't exist yet)
#   • Edit the pinned job-activity message in #jobs (or post it fresh if needed)
#   • Send the weekly payday reminder ping (once per week, deduplicated via KV)
[triggers]
crons = ["*/5 * * * *"]

# ===== KV Namespace =====
# Used to persist the analytics message ID, jobs message ID, and the last
# reminder week so the cron edits existing messages rather than posting new
# ones each run.
#
# The KV namespace is provisioned automatically by the GitHub Actions deploy
# workflow (.github/workflows/deploy-bot.yml). The binding is injected into
# this file at deploy time — no manual setup or id pasting is required.
# The namespace is named "KINTSUGI_BOT" in your Cloudflare account.

# ===== Required Secrets =====
# Set each secret once with:  wrangler secret put <NAME>
# These are also synced automatically from GitHub Actions secrets on every deploy
# (see .github/workflows/deploy-bot.yml).
#
#   DISCORD_PUBLIC_KEY    — Ed25519 public key from the Discord Developer Portal
#   DISCORD_BOT_TOKEN     — Bot token used to post messages to Discord channels
#                           (from the Discord Developer Portal → Bot → Reset Token)
#   ANALYTICS_CHANNEL_ID  — Discord channel ID for the #analytics channel
#                           (right-click channel in Discord → Copy Channel ID)
#   JOBS_CHANNEL_ID       — Discord channel ID for the #jobs channel
#   PAYOUTS_CHANNEL_ID    — Discord channel ID for the #payouts channel
#
# ===== Optional Secrets =====
#   RIPTIDE_USER_ID       — Numeric Discord user ID to @mention on payday (e.g. "123456789012345678")
#                           If omitted, the reminder still posts without a mention
#   TRIGGER_TOKEN         — A secret token that allows the Kintsugi web dashboard to trigger
#                           the "Notify Discord" and "Trigger Weekly" buttons.
#                           Generate any strong random string (e.g. openssl rand -hex 32).

